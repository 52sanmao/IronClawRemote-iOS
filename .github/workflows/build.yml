name: Build iOS

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List Xcode versions
        run: ls /Applications | grep Xcode

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned IPA
        run: |
          set -e
          xcodebuild clean build \
            -project IronClawRemote.xcodeproj \
            -scheme IronClawRemote \
            -sdk iphonesimulator \
            -derivedDataPath DerivedData \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

          APP_PATH=$(find DerivedData -name "IronClawRemote.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app not found"
            exit 1
          fi
          echo "Found app: $APP_PATH"

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r IronClawRemote.ipa Payload
          rm -rf Payload
          ls -lh IronClawRemote.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: IronClawRemote-unsigned
          path: IronClawRemote.ipa
          retention-days: 7
